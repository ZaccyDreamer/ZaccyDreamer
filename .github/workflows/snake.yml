name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: zaccmunuhe7-byte
          outputs: |
            github-contribution-grid-snake.svg

      - name: push to branch
        uses: EndBug/add-and-commit@v9
        with:
          add: "github-contribution-grid-snake.svg"
          message: "update snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
